# SwiftLint configuration for BumpSetCut
# Run locally:  swiftlint           (lint)   /   swiftlint --fix   (autocorrect)
# Intended to back the project's own rules in CLAUDE.md:
#   NO dead code · NO force-unwraps in non-test code · NO resource leaks.

included:
  - BumpSetCut
  - BumpSetCutTests
  - BumpSetCutUITests

excluded:
  - build
  - .build
  - DerivedData
  - BumpSetCut/Resources

# Opt-in rules worth enforcing for this codebase.
opt_in_rules:
  - empty_count
  - empty_string
  - first_where
  - contains_over_first_not_nil
  - last_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - unused_import
  - redundant_nil_coalescing
  - closure_spacing
  - overridden_super_call
  - prohibited_super_call
  - fatal_error_message
  - toggle_bool
  - sorted_first_last

# Force-unwrap hygiene is currently good (zero try!, safe URL(string:)!).
# Keep it that way as a warning, but don't fail the build on the handful of
# provably-safe sites (documented constants, layerClass casts) — and never
# lint test code for force-unwraps (XCTUnwrap aside, tests use them freely).
force_unwrapping:
  severity: warning
force_cast: warning
force_try: error

# Thresholds tuned so the existing codebase isn't a wall of violations.
line_length:
  warning: 160
  error: 240
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 500
  error: 800

file_length:
  warning: 800
  error: 1500
  ignore_comment_only_lines: true

function_body_length:
  warning: 80
  error: 160

function_parameter_count:
  warning: 8
  error: 10

cyclomatic_complexity:
  warning: 20
  error: 35

identifier_name:
  min_length:
    warning: 2      # allow `id`, `vm`, `x`, `y`
  max_length:
    warning: 60
  excluded:
    - id
    - x
    - y
    - r
    - to

nesting:
  type_level: 3

# Noisy defaults that fight SwiftUI / this codebase's conventions.
disabled_rules:
  - todo                    # TODOs are tracked elsewhere
  - trailing_whitespace
  - multiple_closures_with_trailing_closure   # common & fine in SwiftUI
  - opening_brace

reporter: "xcode"
